name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: custom-changes
          fetch-depth: 0

      - name: Sync Fork
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: MorpheApp/MicroG-RE
          upstream_sync_branch: main
          target_sync_branch: custom-changes
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}